name: TikTok Video Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Setup FFmpeg  # ✅ Handles PATH automatically
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: latest
          architecture: x64
          
      - name: Download ZIP from Google Drive
        shell: powershell
        env:
          GOOGLE_DRIVE_URL: ${{ secrets.GOOGLE_DRIVE_URL }}
        run: |
          $url = "${{ secrets.GOOGLE_DRIVE_URL }}"
          New-Item -ItemType Directory -Path "temp_download" -Force
          Invoke-WebRequest -Uri $url -OutFile "temp_download/downloaded.zip"
          Expand-Archive -Path "temp_download/downloaded.zip" -DestinationPath "."
          Write-Host "Files extracted:"
          Get-ChildItem -Recurse

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pex3.py
        run: python pex3.py

      - name: Commit and push output files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if (Test-Path "tiktok_output") {
            Get-ChildItem "tiktok_output" -Include "*.mp4", "*.txt", "*.json" -Recurse | ForEach-Object { git add $_.FullName }
            $hasChanges = $(git status --porcelain)
            if ($hasChanges) {
              git commit -m "Add generated TikTok outputs [skip ci]"
              git push origin main
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

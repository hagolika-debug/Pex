name: TikTok Video Generator

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Download ZIP from Google Drive
        shell: powershell
        env:
          GOOGLE_DRIVE_URL: ${{ secrets.GOOGLE_DRIVE_URL }}
        run: |
          $url = "${{ secrets.GOOGLE_DRIVE_URL }}"
          New-Item -ItemType Directory -Path "temp_download" -Force
          Invoke-WebRequest -Uri $url -OutFile "temp_download/downloaded.zip"
          Expand-Archive -Path "temp_download/downloaded.zip" -DestinationPath "."
          Write-Host "✅ Files extracted:"
          Get-ChildItem -Recurse | Select-Object FullName

      - name: Install Python dependencies
        run: |
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            Write-Error "❌ requirements.txt not found!"
            exit 1
          }

      - name: Install FFmpeg
        shell: powershell
        run: |
          Write-Host "Installing FFmpeg with fallback methods..."
          
          # Method 1: Try winget (most reliable on windows-latest)
          Write-Host "Method 1: Trying winget..."
          $wingetResult = winget install --id Gyan.FFmpeg -e --accept-package-agreements --accept-source-agreements --silent 2>&1
          if ($LASTEXITCODE -eq 0) {
            $ffmpegPath = "C:\Program Files\ffmpeg\bin"
            if (Test-Path "$ffmpegPath\ffmpeg.exe") {
              $env:PATH = "$ffmpegPath;$env:PATH"
              [System.Environment]::SetEnvironmentVariable("PATH", "$env:PATH", "Process")
              ffmpeg -version | Select-Object -First 1
              Write-Host "FFmpeg installed successfully via winget"
              exit 0
            }
          }
          
          # Method 2: Direct download from GitHub releases
          Write-Host "Method 2: Trying direct download..."
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractPath = "$env:TEMP\ffmpeg_extract"
          
          try {
            Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -TimeoutSec 120 -UseBasicParsing
            Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
            $ffmpegExe = Get-ChildItem -Path $extractPath -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
            if ($ffmpegExe) {
              $ffmpegBinDir = $ffmpegExe.Directory.FullName
              $env:PATH = "$ffmpegBinDir;$env:PATH"
              [System.Environment]::SetEnvironmentVariable("PATH", "$env:PATH", "Process")
              ffmpeg -version | Select-Object -First 1
              Write-Host "FFmpeg installed successfully via direct download"
              exit 0
            }
          } catch {
            Write-Host "Direct download failed: $_"
          }
          
          # Method 3: Fallback to Chocolatey with retry
          Write-Host "Method 3: Trying Chocolatey..."
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Chocolatey attempt $i of 3..."
            choco install ffmpeg --yes --limit-output --no-progress 2>$null
            if ($LASTEXITCODE -eq 0) {
              # Chocolatey usually adds ffmpeg to PATH automatically
              $ffmpegCheck = Get-Command ffmpeg -ErrorAction SilentlyContinue
              if ($ffmpegCheck) {
                ffmpeg -version | Select-Object -First 1
                Write-Host "FFmpeg installed successfully via Chocolatey"
                exit 0
              }
            }
            Start-Sleep -Seconds 15
          }
          
          # All methods failed
          Write-Host "ERROR: FFmpeg installation failed after all attempts"
          exit 1

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Run pex3.py
        run: |
          if (Test-Path "pex3.py") {
            python pex3.py
          } else {
            Write-Error "❌ pex3.py not found!"
            exit 1
          }

      - name: Commit and push output files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
            
          if (Test-Path "tiktok_output") {
            $files = Get-ChildItem "tiktok_output" -Include "*.mp4", "*.txt", "*.json" -Recurse
            foreach ($file in $files) {
              git add $file.FullName
            }
              
            $hasChanges = $(git status --porcelain)
            if ($hasChanges) {
              git commit -m "🎬 Add generated TikTok outputs [skip ci]"
              git push origin main
              Write-Host "✅ Pushed $(($files | Measure-Object).Count) files"
            } else {
              Write-Host "⚠️ No new files to commit"
            }
          } else {
            Write-Host "⚠️ tiktok_output directory not found"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

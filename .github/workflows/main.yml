name: TikTok Video Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      kokoro-web:
        image: ghcr.io/eduardolat/kokoro-web:latest
        ports:
          - 3000:3000
        env:
          KW_SECRET_API_KEY: ${{ secrets.KOKORO_API_KEY }}
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/v1/audio/speech || true"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          architecture: x64

      - name: Download ZIP from Google Drive
        env:
          GOOGLE_DRIVE_URL: ${{ secrets.GOOGLE_DRIVE_URL }}
        run: |
          mkdir -p temp_download
          wget -O temp_download/downloaded.zip "$GOOGLE_DRIVE_URL"
          unzip temp_download/downloaded.zip -d .
          echo "Files extracted:"
          ls -R

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Wait for Kokoro-Web to be ready
        run: |
          echo "Waiting for Kokoro-Web API..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/v1/audio/speech > /dev/null 2>&1; then
              echo "✅ Kokoro-Web is ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 3
          done

      - name: Run pex3.py
        env:
          KOKORO_BASE_URL: http://localhost:3000/api/v1
          KOKORO_API_KEY: ${{ secrets.KOKORO_API_KEY }}
        run: python pex3.py

      - name: Commit and push output files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "tiktok_output" ]; then
            find tiktok_output -name "*.mp4" -o -name "*.txt" | xargs git add 2>/dev/null || true
            if git status --porcelain | grep -q .; then
              git commit -m "Add generated TikTok outputs [skip ci]"
              git push origin main
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
